<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Finances</title>
    <link rel="stylesheet" href="css/slyle.css">
</head>
<body>
<div class="container">
    <section class="dashboard">
        <h1 class="main-header">Climate Finance Dashboard</h1>
        <div class="dashboard--inner">
            <div class="global-state">
                <div class="global-target">
                    <h4>Target</h4>
                    <div class="global-target--inner">
                        <img class="global-target-img" src="images/coin.svg" alt="coin">
                        <div class="set-global-target">1.3B</div>
                    </div>
                </div>
                <div class="thermometer">
                    <div class="thermometer--itself">
                        <div class="thermometer-base">
                            <div class="thermometer-fill"></div>
                            <div class="thermometer-marker"></div>
                        </div>
                    </div>
                    <img class="thermometer-img" src="images/coins.png" alt="coins">
                </div>
            </div>

            <div class="current-state">
                <div class="current-total">
                    <h4>Current Total:</h4>
                    <div class="current-total--inner">
                        <img class="current-total-img" src="images/coin.svg" alt="coin">
                        <div class="set-current-total">700B</div>
                    </div>
                </div>
                <div class="current-bars">
                    <div class="mitigation"></div>
                    <div class="adaptation"></div>
                    <div class="lossDamage"></div>
                </div>
            </div>

            <div class="icons-control">
                <a class="settings" href="#">
                    <img class="settings-icon" src="images/settings.svg" alt="settings icon">
                </a>
                <a class="countries-list" href="#">
                    <img class="countries-icon" src="images/countries.svg" alt="planet/world icon">
                </a>
            </div>
        </div>
    </section>

    <section class="contributions">
        <h2 class="contributions-title">Add Contribution</h2>
        <div class="contributions-inputs">
            <form class="make-contribution">
                <div class="form-group amount-group">
                  <label for="amount">Amount</label>
                  <div class="amount-wrapper">
                    <input 
                      type="number" 
                      id="amount" 
                      name="amount" 
                      value="400"
                      min="0"
                    >
                    <span class="amount-unit">B</span>
                  </div>
                </div>
              
                <div class="form-group">
                  <label for="category">Category</label>
                  <select id="category" name="category">
                    <option value="Mitigation">Mitigation</option>
                    <option value="Adaptation">Adaptation</option>
                    <option value="Loss-damage" selected>Loss & Damage</option>
                  </select>
                </div>
              
                <div class="form-group">
                  <label for="country">Country</label>
                  <select id="country" name="country">
                    <option value="ireland-eu" selected>Ireland and EU</option>
                    <option value="us">US</option>
                    <option value="china">China</option>
                    <option value="emdes">EMDEs</option>
                    <option value="petro-chemical-states">Petro-chemical States</option>
                    <option value="uk">UK</option>
                    <option value="sids">SIDS</option>
                    <option value="ldcs">LDCs</option>
                </select>
                </div>
              
                <button type="submit" class="btn btn-add">ADD</button>
                <button type="button" class="btn btn-remove">REMOVE</button>
                <button type="button" class="btn-reset">RESET ALL</button>
              
              </form>
        </div>
    </section>
</div>



<script src="js/main.js"></script>
</body>
</html>
